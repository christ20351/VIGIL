<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">

  <!-- Écran / moniteur -->
  <rect x="15" y="8" width="70" height="52" rx="4" ry="4"
        fill="#1a2a3a" stroke="#4a90d9" stroke-width="2.5"/>

  <!-- Surface écran -->
  <rect x="19" y="12" width="62" height="44" rx="2" ry="2"
        fill="#0d1f2e"/>

  <!-- Lueur écran (effet allumé) -->
  <rect x="19" y="12" width="62" height="44" rx="2" ry="2"
        fill="url(#screenGlow)" opacity="0.6"/>

  <!-- Contenu écran — lignes style terminal -->
  <rect x="24" y="18" width="30" height="2.5" rx="1" fill="#00d4ff" opacity="0.8"/>
  <rect x="24" y="24" width="44" height="2" rx="1" fill="#4a90d9" opacity="0.6"/>
  <rect x="24" y="30" width="36" height="2" rx="1" fill="#4a90d9" opacity="0.6"/>
  <rect x="24" y="36" width="40" height="2" rx="1" fill="#4a90d9" opacity="0.6"/>
  <rect x="24" y="42" width="20" height="2" rx="1" fill="#00e676" opacity="0.9"/>

  <!-- Pied moniteur (col) -->
  <rect x="44" y="60" width="12" height="8" rx="1"
        fill="#1a2a3a" stroke="#4a90d9" stroke-width="1.5"/>

  <!-- Base / socle -->
  <rect x="30" y="68" width="40" height="6" rx="3"
        fill="#1a2a3a" stroke="#4a90d9" stroke-width="1.5"/>

  <!-- Unité centrale (tour) - côté droit -->
  <rect x="72" y="38" width="16" height="30" rx="2"
        fill="#1a2a3a" stroke="#4a90d9" stroke-width="1.5"/>

  <!-- Bouton power tour -->
  <circle cx="80" cy="43" r="2" fill="#00e676"/>
  <circle cx="80" cy="43" r="2" fill="#00e676" opacity="0.4">
    <animate attributeName="r" values="2;3.5;2" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.4;0;0.4" dur="2s" repeatCount="indefinite"/>
  </circle>

  <!-- Lecteur tour -->
  <rect x="74" y="49" width="12" height="2" rx="1" fill="#4a90d9" opacity="0.7"/>
  <rect x="74" y="53" width="12" height="2" rx="1" fill="#4a90d9" opacity="0.5"/>
  <rect x="74" y="57" width="12" height="2" rx="1" fill="#4a90d9" opacity="0.3"/>

  <!-- Câble moniteur → tour -->
  <path d="M72 55 Q68 55 68 60 Q68 64 72 64"
        fill="none" stroke="#4a90d9" stroke-width="1.2" opacity="0.7"/>

  <!-- Clavier -->
  <rect x="18" y="77" width="50" height="14" rx="3"
        fill="#1a2a3a" stroke="#4a90d9" stroke-width="1.5"/>

  <!-- Touches clavier (rangées) -->
  <rect x="21" y="80" width="44" height="2.5" rx="1" fill="#4a90d9" opacity="0.35"/>
  <rect x="21" y="84" width="44" height="2.5" rx="1" fill="#4a90d9" opacity="0.35"/>
  <rect x="21" y="88" width="44" height="2.5" rx="1" fill="#4a90d9" opacity="0.35"/>

  <!-- Dégradés -->
  <defs>
    <radialGradient id="screenGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#00d4ff" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#00d4ff" stop-opacity="0"/>
    </radialGradient>
  </defs>

</svg>
