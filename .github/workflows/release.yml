name: Build & Release VIGIL

on:
  push:
    tags:
      - "v*" # déclenché sur v1.0, v2.0, etc.

jobs:
  # ============================================================
  #  BUILD LINUX
  # ============================================================
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install pyinstaller
          pip install -r agent/requirements.txt  || true
          pip install -r server/requirements.txt || true

      - name: Make smartctl executable (Linux)
        run: |
          if [ -f agent/bin/linux/smartctl ]; then
            chmod +x agent/bin/linux/smartctl
          fi

      - name: Build Agent (Linux)
        working-directory: agent
        run: |
          pyinstaller \
            --onedir \
            --name vigil-agent \
            --add-data "bin/linux/smartctl:bin/linux" \
            agent.py

      - name: Build Server (Linux)
        working-directory: server
        run: |
          pyinstaller \
            --onedir \
            --name vigil-server \
            --add-data "static:static" \
            --add-data "templates:templates" \
            --hidden-import uvicorn.logging \
            --hidden-import uvicorn.loops \
            --hidden-import uvicorn.loops.auto \
            --hidden-import uvicorn.protocols \
            --hidden-import uvicorn.protocols.http \
            --hidden-import uvicorn.protocols.http.auto \
            --hidden-import uvicorn.protocols.websockets \
            --hidden-import uvicorn.protocols.websockets.auto \
            --hidden-import uvicorn.lifespan \
            --hidden-import uvicorn.lifespan.on \
            server.py

      - name: Package agent (Linux)
        run: |
          mkdir -p release-linux/agent
          cp -r agent/dist/vigil-agent/* release-linux/agent/
          echo "Lancez : sudo ./vigil-agent depuis ce dossier" > release-linux/agent/README.txt
          cd release-linux
          tar -czf ../vigil-agent-linux.tar.gz agent/

      - name: Package server (Linux)
        run: |
          mkdir -p release-linux/server
          cp -r server/dist/vigil-server/* release-linux/server/
          echo "Lancez : ./vigil-server depuis ce dossier" > release-linux/server/README.txt
          cd release-linux
          tar -czf ../vigil-server-linux.tar.gz server/

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-binaries
          path: |
            vigil-agent-linux.tar.gz
            vigil-server-linux.tar.gz

  # ============================================================
  #  BUILD WINDOWS
  # ============================================================
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install pyinstaller
          pip install -r agent/requirements.txt
          pip install -r server/requirements.txt

      - name: Build Agent (Windows)
        working-directory: agent
        run: |
          pyinstaller `
            --onedir `
            --name vigil-agent `
            --add-data "bin/windows/smartctl.exe;bin/windows" `
            agent.py

      - name: Build Server (Windows)
        working-directory: server
        run: |
          pyinstaller `
            --onedir `
            --name vigil-server `
            --add-data "static;static" `
            --add-data "templates;templates" `
            --hidden-import uvicorn.logging `
            --hidden-import uvicorn.loops `
            --hidden-import uvicorn.loops.auto `
            --hidden-import uvicorn.protocols `
            --hidden-import uvicorn.protocols.http `
            --hidden-import uvicorn.protocols.http.auto `
            --hidden-import uvicorn.protocols.websockets `
            --hidden-import uvicorn.protocols.websockets.auto `
            --hidden-import uvicorn.lifespan `
            --hidden-import uvicorn.lifespan.on `
            server.py

      - name: Package agent (Windows)
        run: |
          New-Item -ItemType Directory -Force -Path release-win/agent
          Copy-Item -Recurse agent/dist/vigil-agent/* release-win/agent/
          Set-Content release-win/agent/README.txt "Executer vigil-agent.exe en tant qu'Administrateur"
          Compress-Archive -Path release-win/agent/* -DestinationPath vigil-agent-windows.zip

      - name: Package server (Windows)
        run: |
          New-Item -ItemType Directory -Force -Path release-win/server
          Copy-Item -Recurse server/dist/vigil-server/* release-win/server/
          Set-Content release-win/server/README.txt "Executer vigil-server.exe depuis ce dossier"
          Compress-Archive -Path release-win/server/* -DestinationPath vigil-server-windows.zip

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-binaries
          path: |
            vigil-agent-windows.zip
            vigil-server-windows.zip

  # ============================================================
  #  CRÉATION DE LA RELEASE
  # ============================================================
  create-release:
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "VIGIL ${{ github.ref_name }}"
          body: |
            ## 🖥️ VIGIL ${{ github.ref_name }}

            ### 📦 Téléchargements

            | Fichier | OS | Contenu |
            |---|---|---|
            | `vigil-server-windows.zip` | Windows | `vigil-server.exe` + `static/` + `templates/` |
            | `vigil-agent-windows.zip`  | Windows | `vigil-agent.exe` + `smartctl.exe` bundlé |
            | `vigil-server-linux.tar.gz` | Linux  | `vigil-server` + `static/` + `templates/` |
            | `vigil-agent-linux.tar.gz`  | Linux  | `vigil-agent` + `smartctl` bundlé |

            ### 🚀 Utilisation rapide

            **Serveur**
            1. Extraire l'archive `vigil-server-*`
            2. Lancer `vigil-server.exe` (Windows) ou `./vigil-server` (Linux)
            3. Suivre le menu de configuration au démarrage
            4. Accéder au dashboard : `http://localhost:5000`

            **Agent**
            1. Extraire l'archive `vigil-agent-*`
            2. Lancer `vigil-agent.exe` **en tant qu'Administrateur** (Windows)
               ou `sudo ./vigil-agent` (Linux)
            3. Suivre le menu de configuration au 1er lancement

            > ⚠️ Les droits administrateur/root sont requis pour le monitoring S.M.A.R.T. et l'accès réseau complet.

          files: |
            linux-binaries/vigil-agent-linux.tar.gz
            linux-binaries/vigil-server-linux.tar.gz
            windows-binaries/vigil-agent-windows.zip
            windows-binaries/vigil-server-windows.zip
          draft: false
          prerelease: false